<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>對頻 — iamfeeling™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c-bg: #fafaf8; --c-text: #1a1a18; --c-sub: #666660; --c-ter: #999992;
    --c-border: #e0e0d8; --c-green: #1D9E75; --r-sm: 8px; --r-lg: 16px;
    --bg: #0D0E1A; --bg-mid: #13152A; --amber: #C8A96E; --smoke: #8B8FA8;
    --t-text: #F0EEE8; --t-dim: #C4C2BC; --line: rgba(200,169,110,0.18);
  }
  body { background: var(--c-bg); color: var(--c-text); font-family: 'Noto Sans TC', sans-serif; font-size: 16px; line-height: 1.8; }

  /* 1. Navbar 修改 */
  .nav { position: sticky; top: 0; z-index: 100; background: var(--c-bg); border-bottom: 0.5px solid var(--c-border); }
  .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 1.25rem; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-logo img { width: 32px; height: 32px; object-fit: contain; }
  .nav-logo-text { display: none; } /* 隱藏文字 */
  .nav-toggle { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
  .nav-toggle span { display: block; width: 20px; height: 1.5px; background: var(--c-text); transition: all 0.2s; }

  /* 調整選單 */
  .nav-links { display: flex; align-items: center; gap: 0; }
  .nav-links a { font-size: 13px; color: var(--c-sub); text-decoration: none; padding: 6px 14px; }

  /* 4. 手機專用設定 */
  @media (max-width: 600px) {
    .nav-toggle { display: flex; }
    .nav-links { display: none; position: absolute; top: 52px; left: 0; right: 0; background: var(--c-bg); border-bottom: 0.5px solid var(--c-border); flex-direction: column; padding: 1rem; }
    .nav-links.open { display: flex; }
    /* 移除指向自己的 Sticky CTA */
    .nav-cta { display: none; }
  }

  /* 2. 電子報按鈕文字「對頻」 */
  .newsletter-form button { padding: 13px 20px; background: var(--c-green); color: #fff; border: none; border-radius: 0 var(--r-sm) var(--r-sm) 0; cursor: pointer; }

  /* 6. Footer 佈局與大小參考附圖 */
  footer { background: var(--c-bg); border-top: 0.5px solid var(--c-border); padding: 40px 20px; text-align: center; }
  .footer-tagline { font-family: 'Noto Serif TC', serif; font-size: 14px; color: var(--c-sub); margin-bottom: 20px; }
  .footer-copy { font-size: 12px; color: var(--c-ter); margin-bottom: 24px; }
  .footer-social { display: flex; justify-content: center; gap: 2rem; font-size: 13px; color: var(--c-sub); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <img src="/logo.png" alt="iamfeeling™">
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="選單">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <a href="/experiment">空隙實驗</a>
      <a href="/light">還在振動的片刻</a>
      <a href="https://bedo.beehiiv.com/p/about" target="_blank">關於我</a>
    </div>
  </div>
</nav>

<!-- Hero 與主文案內容已完整保留 -->
<header class="hero">
  <!-- (這裡省略中間大量原文案以利閱讀，請保留您原始檔案中的內容) -->
</header>

<!-- 電子報按鈕 -->
<div class="newsletter-form">
  <input type="email" placeholder="輸入您的 Email">
  <button type="button">對頻</button>
</div>

<footer>
  <p class="footer-tagline">外在座標不再可靠。振頻，是唯一帶得走的內在座標。</p>
  <p class="footer-copy">振頻，從這裡發出 &nbsp;·&nbsp; © 2026 iamfeeling™ &nbsp;·&nbsp; BeDo LLC</p>
  <div class="footer-social">
    <a href="#">LinkedIn</a>
    <a href="#">Threads</a>
  </div>
</footer>

<script>
  document.getElementById('navToggle').addEventListener('click', function(){
    document.getElementById('navLinks').classList.toggle('open');
  });
</script>
</body>
</html>
