<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iamfeeling™ — 完整意識的甦醒</title>
  <style>
    :root {
      --c-bg: #fafaf8;
      --c-text: #1a1a18;
      --c-sub: #666660;
      --c-ter: #999992;
      --c-border: #e0e0d8;
      --c-green: #1D9E75;
      --c-green-bg: #E1F5EE;
      --c-green-text: #085041;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: 'Georgia', serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--c-bg);
      border-bottom: 0.5px solid var(--c-border);
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.25rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 13px;
      font-weight: 600;
      color: var(--c-text);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .nav-links a {
      font-size: 13px;
      color: var(--c-sub);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: var(--r-sm);
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: var(--c-text);
      background: #f0f0ec;
    }

    .nav-links a.active {
      color: var(--c-text);
    }

    .nav-cta {
      background: var(--c-green) !important;
      color: #fff !important;
      border-radius: var(--r-sm) !important;
      font-size: 13px;
      margin-left: 6px;
    }

    .nav-cta:hover {
      opacity: 0.88;
      background: var(--c-green) !important;
    }

    .nav-divider {
      width: 0.5px;
      height: 16px;
      background: var(--c-border);
      margin: 0 8px;
    }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .nav-toggle span {
      display: block;
      width: 20px;
      height: 1px;
      background: var(--c-text);
      transition: all 0.2s;
    }

    /* ── HERO ── */
    .hero {
      max-width: 560px;
      margin: 0 auto;
      padding: 5rem 1.25rem 3rem;
      text-align: center;
    }

    .hero-label {
      font-size: 11px;
      color: var(--c-ter);
      letter-spacing: 0.16em;
      text-transform: none;
      margin-bottom: 1.5rem;
    }

    .hero-title {
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 400;
      line-height: 1.45;
      font-style: italic;
      color: var(--c-text);
      margin-bottom: 1.25rem;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--c-sub);
      line-height: 1.9;
      margin-bottom: 3rem;
    }

    /* ── ENTRY CARDS ── */
    .entries {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1.25rem 5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .entry-card {
      background: #fff;
      border: 0.5px solid var(--c-border);
      border-radius: var(--r-lg);
      padding: 1.75rem 1.25rem;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: left;
    }

    .entry-card:hover {
      border-color: var(--c-green);
      box-shadow: 0 2px 16px rgba(29,158,117,0.08);
    }

    .entry-icon {
      font-size: 24px;
      margin-bottom: 1rem;
      display: block;
    }

    .entry-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--c-text);
      margin-bottom: 0.5rem;
      letter-spacing: 0.01em;
    }

    .entry-desc {
      font-size: 13px;
      color: var(--c-sub);
      line-height: 1.75;
    }

    .entry-arrow {
      display: block;
      margin-top: 1.25rem;
      font-size: 12px;
      color: var(--c-green);
      letter-spacing: 0.04em;
    }

    /* ── DIVIDER ── */
    .section-divider {
      max-width: 560px;
      margin: 0 auto 2rem;
      padding: 0 1.25rem;
      border-top: 0.5px solid var(--c-border);
    }

    /* ── SUBSCRIBE ── */
    .subscribe-section {
      border-top: 0.5px solid var(--c-border);
      padding: 3rem 1.25rem;
    }

    .subscribe-inner {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    .subscribe-label {
      font-size: 11px;
      color: var(--c-ter);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      font-family: sans-serif;
    }

    .subscribe-title {
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      color: var(--c-text);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .subscribe-sub {
      font-size: 14px;
      color: var(--c-sub);
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 0.5px solid var(--c-border);
      padding: 1.5rem 1.25rem;
      text-align: center;
    }

    .footer p {
      font-size: 12px;
      color: var(--c-ter);
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .nav-links {
        display: none;
        position: absolute;
        top: 52px;
        left: 0;
        right: 0;
        background: var(--c-bg);
        border-bottom: 0.5px solid var(--c-border);
        flex-direction: column;
        align-items: flex-start;
        padding: 0.75rem 1.25rem 1rem;
        gap: 2px;
      }

      .nav-links.open { display: flex; }

      .nav-links a { width: 100%; padding: 10px 12px; }
      .nav-cta { margin-left: 0 !important; margin-top: 6px; text-align: center; }
      .nav-divider { display: none; }
      .nav-toggle { display: flex; }

      .entries { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">iamfeeling™</a>
      <button class="nav-toggle" id="navToggle" aria-label="選單">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="/experiment" >感知實驗</a>
        <a href="https://bebeforedo.github.io/carddrawing/">帶著牌進入98%</a>
        <a href="https://bedo.beehiiv.com/p/tune-in" target="_blank" class="nav-cta">加入對頻</a>
        <div class="nav-divider"></div>
        <a href="https://bedo.beehiiv.com/p/about" target="_blank">關於我</a>
        <a href="https://bedo.beehiiv.com/p/the-system" target="_blank">關於這個系統</a>
        <a href="https://bedo.beehiiv.com/p/freedom" target="_blank">關於這個時代</a>
      </div>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-label">iamfeeling™</div>
    <h1 class="hero-title">你的意識，比你以為的<br>還要完整。</h1>
    <p class="hero-sub">我們只活用了 2% 的意識。<br>剩下的 98%，正在等你回來。</p>
  </div>

  <div class="entries">
    <a class="entry-card" href="/experiment">
      <span class="entry-icon">◎</span>
      <div class="entry-title">感知實驗</div>
      <div class="entry-desc">一張圖，一次呼吸，看看你的身體狀態如何改變你所看見的東西。</div>
      <span class="entry-arrow">進入實驗 →</span>
    </a>
    <a class="entry-card" href="https://bebeforedo.github.io/carddrawing/">
      <span class="entry-icon">⬡</span>
      <div class="entry-title">帶著牌進入98%</div>

      <span class="entry-arrow">開始抽牌 →</span>
    </a>
  </div>

  <div class="subscribe-section">
    <div class="subscribe-inner">
      <div class="subscribe-label">電子報</div>
      <h2 class="subscribe-title">讓生命重獲完整的必要練習</h2>
      <p class="subscribe-sub">不只是電子報。每一封，都是一次把意識帶回身體的邀請。</p>
      <script async src="https://subscribe-forms.beehiiv.com/v3/loader.js" data-beehiiv-form="b599d456-c019-4312-bd4b-33ea70a5b4f9"></script>
    </div>
  </div>

  <footer class="footer">
    <p>iamfeeling™ &nbsp;·&nbsp; BeDo LLC &nbsp;·&nbsp; 影響顧問有限公司</p>
  </footer>

  <script>
    document.getElementById('navToggle').addEventListener('click', function(){
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>

</body>
</html>
